<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <defs>
    <linearGradient id="bgG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <filter id="gw" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
  </defs>
  <!-- Vivid blue badge background -->
  <rect x="0.5" y="0.5" width="23" height="23" rx="5.5" fill="url(#bgG)"/>
  <!-- Subtle glass sheen at top -->
  <rect x="2" y="1.5" width="20" height="6" rx="3" fill="white" opacity="0.18"/>
  <!-- Outer border -->
  <rect x="0.5" y="0.5" width="23" height="23" rx="5.5" fill="none" stroke="white" stroke-width="0.6" opacity="0.25"/>
  <!-- Bold solid download arrow: shaft + wide arrowhead fill -->
  <path d="M9.5 5.5 L14.5 5.5 L14.5 13 L20.5 13 L12 21 L3.5 13 L9.5 13 Z"
        fill="white" filter="url(#gw)"/>
  <!-- Bottom floor bar -->
  <rect x="5.5" y="21.5" width="13" height="1.5" rx="0.75" fill="white" opacity="0.7"/>
</svg>
